<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f1320">
<title>Furnishing Estimator</title>
<style>
  :root{
    --bg:#0f1320; --panel:#171c2e; --panel2:#1e2540; --line:#2a3252; --txt:#e7ebf5;
    --muted:#9aa6c4; --accent:#6c8cff; --good:#00c2a8; --warn:#ffb020;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:16px;line-height:1.4}
  .app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:96px}
  .top{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#141a2e,#0f1320);
       padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .top h1{font-size:17px;margin:0;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .save{font-size:12px;color:var(--good)}
  .langsel{background:#10162a;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 8px;font-size:13px;max-width:120px}
  .wrap{padding:16px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:18px 2px 10px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:52px;padding:12px 18px;
       border:none;border-radius:14px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;width:100%}
  .btn:active{transform:scale(.985)}
  .btn.sec{background:#283050;color:var(--txt)}
  .btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--muted);min-height:44px;font-weight:600}
  .btn.sm{min-height:42px;font-size:14px;padding:8px 14px;width:auto}
  .btn[disabled]{opacity:.4}
  .row{display:flex;gap:10px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px}
  .room{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:14px}
  .room .rh{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;margin-bottom:8px}
  .room .rh .x{margin-left:auto;color:var(--muted);background:transparent;border:none;font-size:20px;padding:4px 8px}
  .place{display:flex;align-items:center;gap:12px;background:#10162a;border:1px solid var(--line);
         border-radius:14px;padding:14px;margin:8px 0;cursor:pointer}
  .place .pi{font-size:22px}
  .place .pt{flex:1}
  .place .pt b{font-size:16px}
  .place .pt small{display:block;color:var(--muted);font-size:13px}
  .place .chev{color:var(--muted);font-size:22px}
  .place .done{color:var(--good)}
  .place .pr{color:var(--good);font-weight:700;font-size:15px}
  .pickgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pickgrid .rb{display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--panel);
       border:1.5px solid var(--line);border-radius:16px;padding:18px 8px;cursor:pointer;font-weight:700;font-size:15px}
  .pickgrid .rb .ic{font-size:32px}
  .pickgrid .rb:active{border-color:var(--accent)}
  .prodgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .prod{background:var(--panel);border:1.5px solid var(--line);border-radius:16px;padding:10px;text-align:center;cursor:pointer}
  .prod img{width:92px;height:92px;object-fit:contain}
  .prod div{font-weight:700;font-size:14px;margin-top:4px}
  .prod:active{border-color:var(--accent)}
  .field{margin:16px 0}
  .field > label{display:block;font-size:15px;font-weight:600;margin-bottom:6px}
  .qhint{font-size:12.5px;color:var(--muted);margin:-2px 0 9px;line-height:1.35}
  .field .req{color:var(--warn)}
  .pills{display:flex;flex-wrap:wrap;gap:10px}
  .pill{min-height:48px;display:flex;align-items:center;padding:10px 18px;border:1.5px solid var(--line);
        border-radius:999px;background:#10162a;color:var(--txt);font-size:15px;cursor:pointer;user-select:none}
  .pill.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  .otiles{display:flex;flex-wrap:wrap;gap:10px}
  .otile{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:84px;padding:10px 12px;
        border:1.5px solid var(--line);border-radius:14px;background:#10162a;color:var(--txt);
        cursor:pointer;font-size:13px;font-weight:600;user-select:none;text-align:center}
  .otile img{width:42px;height:42px;object-fit:contain}
  .otile.on{border-color:var(--accent);background:rgba(108,140,255,.16)}
  .measgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .meas label{display:block;font-size:14px;font-weight:600;margin-bottom:6px}
  .meas input{width:100%;font-size:22px;font-weight:700;text-align:center;padding:14px;border-radius:14px;
        border:1.5px solid var(--line);background:#10162a;color:var(--txt)}
  .meas input:focus{outline:none;border-color:var(--accent)}
  .meas small{display:block;text-align:center;color:var(--muted);font-size:12px;margin-top:4px}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .metric{background:#10162a;border:1px solid var(--line);border-radius:14px;padding:12px}
  .metric .v{font-size:20px;font-weight:800;color:var(--good)}
  .metric .k{font-size:12px;color:var(--muted)}
  .hero{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:6px}
  .hero img{width:64px;height:64px;object-fit:contain}
  .hero b{font-size:18px}
  .bottom{position:fixed;left:0;right:0;bottom:0;z-index:40;background:#0f1320cc;backdrop-filter:blur(6px);
          border-top:1px solid var(--line);padding:12px 16px}
  .bottom .inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:12px}
  .bottom .tot{flex:1}
  .bottom .tot .k{font-size:12px;color:var(--muted)}
  .bottom .tot .v{font-size:22px;font-weight:800;color:var(--good)}
  .empty{color:var(--muted);text-align:center;padding:36px 16px}
  .muted{color:var(--muted)}
  input.name{width:100%;font-size:16px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#10162a;color:var(--txt)}
  .badge{background:#283050;border-radius:999px;padding:2px 9px;font-size:11px;color:var(--muted)}
  .badge.ok{background:rgba(0,194,168,.2);color:var(--good)}
  .badge.warn{background:rgba(255,176,32,.2);color:var(--warn)}
  .badge.bad{background:rgba(255,107,107,.2);color:#ff6b6b}
  .stbar{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--line)}
  .sttab{flex:1;text-align:center;padding:11px 6px;border-radius:11px;background:#10162a;border:1px solid var(--line);
        font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
  .sttab.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .ihead{display:flex;align-items:center;gap:8px;font-size:16px;margin-bottom:2px;flex-wrap:wrap}
  .flbl{font-size:12px;color:var(--muted);display:block;margin:10px 0 4px}
  .phrow{display:flex;gap:10px;align-items:center;margin-top:10px}
  .photo{width:88px;height:88px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
  .phbox{width:88px;height:88px;display:flex;align-items:center;justify-content:center;text-align:center;
        font-size:11px;color:var(--muted);border:1.5px dashed var(--line);border-radius:12px;padding:4px}
  .dimsvg{display:block;margin:2px auto 10px;max-width:300px}
  .asgrow{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 8px;padding:0 2px}
  .asg{flex:1;min-width:92px;background:#10162a;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px}
  .cbtn{border-color:#ff6b6b;color:#ff6b6b;min-height:38px;margin:0 0 12px;width:100%}
  .asgcap{display:flex;gap:6px;flex-wrap:wrap;margin:-4px 0 8px;padding:0 2px;font-size:11px;color:var(--muted)}
  .asgcap span{flex:1;min-width:92px;text-align:center}
  .asgcap b{color:var(--txt)}
  .cwarn{background:rgba(255,107,107,.12);border:1px solid #ff6b6b;border-radius:8px;padding:8px 10px;margin:0 0 12px;font-size:12px;color:#ffb3b3}
  .cwarn small{color:var(--muted)}
</style>
</head>

/* ---------------- auto-save ---------------- */
function scheduleSave(){
  saveState=t('saving'); paintTop();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveNow,700);
}
async function saveNow(){
  const d=await api("/api/projects",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:project.id,name:project.name,data:{rooms:project.rooms,lang:lang,stage:project.stage,locked:project.locked}})});
  project.id=d.id; saveState=t('saved'); paintTop();
}
function paintTop(){const s=document.getElementById("saveState"); if(s) s.textContent=saveState;}

/* ---------------- helpers ---------------- */
function room(){return project.rooms.find(r=>r.id===active.roomId);}
function place(){const r=room();return r&&r.placements.find(p=>p.id===active.placeId);}
function catName(id){const c=CATS.find(x=>x.id===id);return c?c.name:id;}
function catImg(id){const c=CATS.find(x=>x.id===id);return c&&c.image;}
function projectTotal(){let t=0;project.rooms.forEach(r=>r.placements.forEach(p=>{const pr=p.selection&&p.selection.computed.find(c=>c.name==="price");if(pr)t+=pr.value;}));return t;}

/* ================= RENDER ================= */
function render(){
  if(!me){renderLogin();return;}
  if(view==="configure"){renderConfigure();return;}
  if(me.role!=='supervisor'){
    if(workerItem){renderTaskItem();return;}
    renderWorker();return;
  }
  if(project.locked&&project.stage==="preparation"){renderPrep();return;}
  if(project.locked&&project.stage==="installation"){renderInstall();return;}
  renderHome();
}

function optHTML(c, o, on, handler){
  const v=optVal(o), ic=optIcon(o), lb=optLabel(o);
  if(ic) return `<div class="otile ${on?'on':''}" onclick="${handler}('${c.name}','${esc(v)}')"><img src="${esc(ic)}"><span>${esc(lb)}</span></div>`;
  return `<div class="pill ${on?'on':''}" onclick="${handler}('${c.name}','${esc(v)}')">${esc(lb)}</div>`;
}
function choiceHTML(c){
  const cur=cfg.answers.choices[c.name];
  const h=tx(c.hint);
  const hint=h?`<div class="qhint">${esc(h)}</div>`:'';
  const hasIcons=(c.options||[]).some(o=>optIcon(o));
  const wrap=hasIcons?'otiles':'pills';
  if(c.type==="multi"){
    const arr=Array.isArray(cur)?cur:[];
    const opts=c.options.map(o=>optHTML(c,o,arr.includes(optVal(o)),'onMulti')).join("");
    return `<div class="field"><label>${esc(tx(c.label))} <span class="muted" style="font-weight:400">· ${t('tapAny')}</span></label>${hint}
      <div class="${wrap}">${opts}</div></div>`;
  }
  const opts=c.options.map(o=>optHTML(c,o,cur===optVal(o),'onChoice')).join("");
  return `<div class="field"><label>${esc(tx(c.label))} ${c.required?'<span class="req">*</span>':''}</label>${hint}
    <div class="${wrap}">${opts}</div></div>`;
}
function computedHTML(res){
  const out=res.computed.filter(c=>c.name!=="price");
  if(!out.length) return `<p class="muted" style="text-align:center">${t('enterMeas')}</p>`;
  return `<h2>${t('calculated')}</h2><div class="metrics">${out.map(c=>`<div class="metric"><div class="v">${fmt(c.value)} <span style="font-size:13px">${esc(c.unit)}</span></div><div class="k">${esc(tx(c.label))}</div></div>`).join("")}</div>`;
}
function priceOf(res){const p=res.computed.find(c=>c.name==="price");return p?p.value:0;}

async function seedAndResolve(){
  const full=await api("/api/categories/"+cfg.catId);
  (full.choices||[]).forEach(c=>{if(cfg.answers.choices[c.name]===undefined&&c.default!==undefined)cfg.answers.choices[c.name]=c.default;});
  const r=room(); const rm=ROOMS.find(x=>x.id===r.roomId);
  const rd=rm&&rm.defaults&&rm.defaults[cfg.catId];
  if(rd)Object.entries(rd).forEach(([k,v])=>{if(cfg.answers.choices[k]===undefined)cfg.answers.choices[k]=v;});
  await doResolve();
}
async function doResolve(){
  cfg.res=await api("/api/resolve",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({category_id:cfg.catId,answers:cfg.answers})});
  cfg.ready=isComplete(cfg.res);
}
function isComplete(res){
  for(const c of res.choices){if(c.required&&!cfg.answers.choices[c.name])return false;}
  for(const m of res.measurements){const v=cfg.answers.measurements[m.name];
    if(m.required&&(v===undefined||v===""))return false;
    if(v!==undefined&&v!==""){if(m.min!=null&&v<m.min)return false;if(m.max!=null&&v>m.max)return false;}}
  return true;
}

function pickProduct(catId){cfg.catId=catId;cfg.answers={choices:{},measurements:{}};cfg.res=null;renderConfigure();}
function changeProduct(){cfg.catId=null;cfg.res=null;renderConfigure();}
function onChoice(name,val){cfg.answers.choices[name]=val;cfg.res=null;renderConfigure();}
function onMulti(name,val){let a=Array.isArray(cfg.answers.choices[name])?cfg.answers.choices[name].slice():[];a.includes(val)?a=a.filter(x=>x!==val):a.push(val);cfg.answers.choices[name]=a;cfg.res=null;renderConfigure();}
let measTimer=null;
function onMeas(name,val){
  cfg.answers.measurements[name]=val===""?undefined:Number(val);
  if(name==='width'){const e=document.getElementById('dimW');if(e)e.textContent=(val===''?'W':val+'"');}
  if(name==='height'){const e=document.getElementById('dimH');if(e)e.textContent=(val===''?'H':val+'"');}
  clearTimeout(measTimer);
  measTimer=setTimeout(async()=>{
    await doResolve();
    const el=document.getElementById("cfgComputed"); if(el)el.innerHTML=computedHTML(cfg.res);
    const sb=document.getElementById("cfgSave"); if(sb)sb.disabled=!cfg.ready;
  },350);
}
function saveSelection(){
  const p=place();
  p.selection={category_id:cfg.catId,answers:JSON.parse(JSON.stringify(cfg.answers)),
    choices:{...cfg.answers.choices},measurements:{...cfg.answers.measurements},computed:cfg.res.computed};
  clearComplaint(p,'measure');
  scheduleSave(); backHome();
}

/* ================= WORKFLOW (Measure -> Prep -> Install) ================= */
function allConfigured(){return project.rooms.length>0 && project.rooms.every(r=>r.placements.length>0 && r.placements.every(p=>p.selection));}
function lockMeasure(){if(!allConfigured()){alert("Finish all measurements first.");return;}project.locked=true;project.stage="preparation";scheduleSave();render();}
function setStage(s){project.stage=s;scheduleSave();render();}
function stageBarHTML(){
  if(!project.locked) return '';
  const tabs=[["measurement","📐",t('stMeasure')],["preparation","✂️",t('stPrep')],["installation","🔧",t('stInstall')]];
  return `<div class="stbar">${tabs.map(([s,ic,lb])=>`<div class="sttab ${project.stage===s?'on':''}" onclick="setStage('${s}')">${ic} ${esc(lb)}</div>`).join("")}</div>`;
}
function items(){const out=[];project.rooms.forEach(r=>r.placements.forEach(p=>{if(p.selection)out.push({r,p});}));return out;}
function work(p){if(!p.work)p.work={status:'pending'};return p.work;}
function prepNeeded(p){return p.selection && p.selection.category_id!=='wallpaper';}
function findP(rid,pid){const r=project.rooms.find(x=>x.id===rid);return r&&r.placements.find(x=>x.id===pid);}
function setWork(rid,pid,k,v){const p=findP(rid,pid);if(p){work(p)[k]=v;scheduleSave();render();}}

/* ---- camera photo -> compressed dataURL stored in the project ---- */
function takePhoto(cb){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.setAttribute('capture','environment');
  inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>shrink(rd.result,900,0.6,cb);rd.readAsDataURL(f);};
  inp.click();
}
function shrink(src,max,q,cb){const im=new Image();im.onload=()=>{let w=im.width,h=im.height;if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(im,0,0,w,h);cb(cv.toDataURL('image/jpeg',q));};im.src=src;}
function photoFor(rid,pid,field){const p=findP(rid,pid);if(!p)return;takePhoto(d=>{work(p)[field]=d;scheduleSave();render();});}

/* ---- PREPARATION ---- */
function prepCard(r,p){

      <div class="muted" style="font-size:13px">${esc(tx(r.name))} · ready for installation</div></div>`; }
  const ph=w.material_photo;
  const c=w.complaint&&w.complaint.stage==='prep'?w.complaint:null;
  const banner=c?`<div class="card" style="border-color:#ff6b6b;margin:0 0 10px">${c.photo?`<img class="photo" src="${c.photo}" style="width:100%;height:auto;max-height:160px">`:''}<div class="muted" style="font-size:13px;margin-top:6px"><b style="color:#ff6b6b">⚠ Complaint:</b> ${esc(c.note||'-')}</div></div>`:'';
  const badge=c?'<span class="badge bad">Complaint — redo</span>':w.ready?'<span class="badge ok">Ready ✓</span>':(w.validated?'<span class="badge warn">In prep</span>':'<span class="badge">To validate</span>');
  return `${banner}<div class="card"><div class="ihead"><b>${esc(p.label)}</b> · ${prod} ${badge}</div>
    <div class="muted" style="font-size:13px">${esc(tx(r.name))}</div>

    <div class="muted" style="font-size:12px;margin-top:6px">Check the material matches the customer's purchase.</div>
    ${!c&&ph&&!w.validated?`<button class="btn" style="margin-top:10px" onclick="setWork('${r.id}','${p.id}','validated',true)">✓ Matches purchase → start prep</button>`:''}
    ${c||(w.validated&&!w.ready)?`<button class="btn" style="margin-top:10px;background:var(--good)" onclick="finishPrep('${r.id}','${p.id}')">✓ ${c?'Fixed → Ready for install':'Prep done → Ready for install'}</button>`:''}
  </div>`;
}

/* ---- INSTALLATION (+ Repairing) ---- */
function markInstalled(rid,pid){const p=findP(rid,pid);const w=work(p);w.status='installed';w.ready=true;clearComplaint(p,'install');w.rework_note='';w.issue_photo=null;scheduleSave();render();}
function finishPrep(rid,pid){const p=findP(rid,pid);const w=work(p);w.validated=true;w.ready=true;clearComplaint(p,'prep');scheduleSave();render();}
function reportIssue(rid,pid){const note=prompt("Describe the issue / changes required:");if(note===null)return;const p=findP(rid,pid);const w=work(p);w.status='rework';w.rework_note=note;scheduleSave();render();takePhoto(d=>{w.issue_photo=d;scheduleSave();render();});}
function resolveRework(rid,pid){const p=findP(rid,pid);const w=work(p);w.status='pending';w.issue_photo=null;w.rework_note='';scheduleSave();render();}
function reworkCard(r,p){
  const w=work(p);
  const issuePh=w.issue_photo?`<img class="photo" src="${w.issue_photo}" style="width:100%;height:auto;max-height:180px">`:'';
  return `<div class="card"><div class="ihead"><b>${esc(p.label)}</b> · ${esc(tx(catName(p.selection.category_id)))} <span class="badge bad">Rework</span></div>${issuePh}<div class="muted" style="font-size:13px;margin:8px 0">Issue: ${esc(w.rework_note||'-')}</div><button class="btn" onclick="resolveRework('${r.id}','${p.id}')">↩ back to install</button></div>`;
}
// single-item install card for the worker view (handles a fresh install AND a
// reassigned complaint/rework in ONE screen, so the new person can redo it).
function installCard(r,p){
  const w=work(p), prod=esc(tx(catName(p.selection.category_id)));
  const c=w.complaint&&w.complaint.stage==='install'?w.complaint:null;
  const installed=w.status==='installed'&&!c;
  const badge=installed?'<span class="badge ok">Installed ✓</span>':c?'<span class="badge bad">Complaint — redo</span>':'<span class="badge">Pending</span>';
  const ph=w.installed_photo;
  const banner=c?`<div class="card" style="border-color:#ff6b6b;margin:0 0 10px">${c.photo?`<img class="photo" src="${c.photo}" style="width:100%;height:auto;max-height:160px">`:''}<div class="muted" style="font-size:13px;margin-top:6px"><b style="color:#ff6b6b">⚠ Complaint:</b> ${esc(c.note||'-')}</div></div>`:'';
  return `${banner}<div class="card"><div class="ihead"><b>${esc(p.label)}</b> · ${prod} ${badge}</div>
    <div class="muted" style="font-size:13px">${esc(tx(r.name))}</div>
    <div class="phrow">${ph?`<img class="photo" src="${ph}">`:'<div class="phbox">photo of installed product</div>'}
      <button class="btn sec" style="flex:1" onclick="photoFor('${r.id}','${p.id}','installed_photo')">📷 ${ph?'Retake':'Photo of installed product'}</button></div>
    ${ph&&!installed?`<button class="btn" style="margin-top:10px;background:var(--good)" onclick="markInstalled('${r.id}','${p.id}')">✓ ${c?'Fixed → Mark installed':'Mark installed'}</button>`:''}
  </div>`;
}
function renderInstall(){
  const app=document.getElementById("app");
  const ready=items().filter(({p})=>(work(p).ready || !prepNeeded(p)) && work(p).status!=='rework');
  const rework=items().filter(({p})=>work(p).status==='rework');
  const card=({r,p})=>{
    const w=work(p), prod=esc(tx(catName(p.selection.category_id)));
    const badge=w.status==='installed'?'<span class="badge ok">Installed ✓</span>':'<span class="badge">Pending</span>';
    const ph=w.installed_photo;
    return `<div class="card"><div class="ihead"><b>${esc(p.label)}</b> · ${prod} ${badge}</div>
      <div class="muted" style="font-size:13px">${esc(tx(r.name))}</div>
      <label class="flbl">Installer (who is installing this)</label>
      <input class="name" value="${esc(w.installer||'')}" placeholder="name" onchange="setWork('${r.id}','${p.id}','installer',this.value)">
      <div class="phrow">${ph?`<img class="photo" src="${ph}">`:'<div class="phbox">photo of installed product</div>'}
        <button class="btn sec" style="flex:1" onclick="photoFor('${r.id}','${p.id}','installed_photo')">📷 ${ph?'Retake':'Photo of installed product'}</button></div>
      ${ph&&w.status!=='installed'?`<button class="btn" style="margin-top:10px;background:var(--good)" onclick="markInstalled('${r.id}','${p.id}')">✓ Mark installed</button>`:''}
      <button class="btn ghost" style="margin-top:8px;border-color:#ff6b6b;color:#ff6b6b" onclick="reportIssue('${r.id}','${p.id}')">⚠ Report issue → Repairing</button>
    </div>`;
  };
  app.innerHTML=`<div class="top"><h1>🔧 ${esc(t('stInstall'))}</h1>${langSelectHTML()}<span class="save" id="saveState">${saveState}</span></div>
    ${stageBarHTML()}
    <div class="wrap">
      <h2>To install</h2>
      ${ready.length?ready.map(card).join(""):'<div class="empty">Nothing ready yet — finish Prep first.</div>'}
      ${rework.length?('<h2 style="color:#ff6b6b">🛠 Repairing</h2>'+rework.map(({r,p})=>reworkCard(r,p)).join("")):''}
    </div>`;
}

/* ================= MULTI-USER (login + roles) ================= */
function roleIcon(){return ({supervisor:'🧑‍💼',measurer:'📐',tailor:'✂️',installer:'🔧'})[me.role]||'👤';}
function roleLabel(){return ({supervisor:'Supervisor',measurer:'Measurer',tailor:'Tailor',installer:'Installer'})[me.role]||me.role;}

function renderLogin(){
  const app=document.getElementById("app");
  app.innerHTML=`<div class="top"><h1>🪟 Furnishing Estimator</h1></div>
    <div class="wrap"><div class="card">
      <h2>Login</h2>
      <label class="flbl">Your name</label>
      <select id="loginName" class="name">${USERS.map(u=>`<option value="${esc(u.name)}">${esc(u.name)} — ${esc(u.role)}</option>`).join("")}</select>
      <label class="flbl">4-digit PIN</label>
      <input id="loginPin" class="name" type="tel" inputmode="numeric" maxlength="4" placeholder="● ● ● ●">
      <div id="loginErr" style="color:#ff6b6b;font-size:13px;margin-top:8px"></div>
      <button class="btn" style="margin-top:14px" onclick="doLogin()">Login</button>
    </div>
    <div class="muted" style="font-size:12px;text-align:center;line-height:1.7">Demo PINs — Ramesh 1111 · Sita 2222 · Imran 3333 · Arjun 4444 · Vijay 5555</div></div>`;
}
async function doLogin(){
  const name=document.getElementById("loginName").value;
  const pin=document.getElementById("loginPin").value;
  const r=await api("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,pin})});
  if(r.user){me=r.user;try{localStorage.setItem('fe_user',JSON.stringify(me));}catch(e){}workerItem=false;view="home";render();}
  else{const e=document.getElementById("loginErr");if(e)e.textContent="Wrong name or PIN — try again.";}
}
function logout(){me=null;try{localStorage.removeItem('fe_user');}catch(e){}workerItem=false;view="home";render();}

/* ---- assignment (supervisor) ---- */
const STAGE_ROLE={measure:'measurer',prep:'tailor',install:'installer'};
function assignSel(rid,p,stage){
  const role=STAGE_ROLE[stage], cur=(p.assign||{})[stage]||'';
  const opts=USERS.filter(u=>u.role===role);
  return `<select class="asg" onchange="assignTask('${rid}','${p.id}','${stage}',this.value)"><option value="">${role}…</option>${opts.map(u=>`<option value="${u.id}" ${cur===u.id?'selected':''}>${esc(u.name)}</option>`).join("")}</select>`;
}
function assignTask(rid,pid,stage,uid){const p=findP(rid,pid);if(!p)return;if(!p.assign)p.assign={};p.assign[stage]=uid||null;scheduleSave();render();}
function userName(id){const u=USERS.find(x=>x.id===id);return u?u.name:'';}
const STAGE_NAME={measure:'📐 Measurer',prep:'✂️ Tailor',install:'🔧 Installer'};
// names currently assigned to each stage, shown under the dropdowns
function assignCap(p){const a=p.assign||{};const cell=(ic,s)=>`<span>${ic} ${a[s]?`<b>${esc(userName(a[s])||'?')}</b>`:'<i style="opacity:.5">unassigned</i>'}</span>`;
  return `<div class="asgcap">${cell('📐','measure')}${cell('✂️','prep')}${cell('🔧','install')}</div>`;}
// supervisor: log a complaint against a chosen stage (measure / prep / install) OR show the open one
let complaintFor=null; // pid currently choosing which stage to send back to
function askComplaint(pid){complaintFor=pid;render();}
function cancelComplaint(){complaintFor=null;render();}
function reportComplaint(rid,pid,stage){
  const who=userName((findP(rid,pid).assign||{})[stage]);
  const note=prompt("What is the problem? (goes to the "+STAGE_NAME[stage].replace(/^\S+\s/,'')+(who?" — "+who:"")+")");
  if(note===null){complaintFor=null;render();return;}
  const p=findP(rid,pid), w=work(p);
  w.complaint={stage:stage,note:note,photo:null};
  complaintFor=null;scheduleSave();render();
  takePhoto(d=>{if(w.complaint)w.complaint.photo=d;scheduleSave();render();});
}
function clearComplaint(p,stage){const w=p.work;if(w&&w.complaint&&w.complaint.stage===stage)w.complaint=null;}
function complaintRow(r,p){const w=p.work||{}, c=w.complaint;
  if(c){const who=userName((p.assign||{})[c.stage]);
    return `<div class="cwarn" onclick="event.stopPropagation()">⚠ <b>Complaint → ${STAGE_NAME[c.stage]}:</b> ${esc(c.note||'-')}<br><small>${who?('Sent for correction to: '+esc(who)+' — change '+STAGE_NAME[c.stage]+' above to reassign'):'⬆ Pick a '+STAGE_NAME[c.stage].replace(/^\S+\s/,'')+' above to send this for correction'}</small></div>`;}
  if(w.status==='installed'){
    if(complaintFor===p.id){
      const b=(s)=>`<button class="asg" style="cursor:pointer" onclick="reportComplaint('${r.id}','${p.id}','${s}')">${STAGE_NAME[s]}</button>`;
      return `<div class="cwarn" onclick="event.stopPropagation()"><b>Send back for correction to:</b>
        <div class="asgrow" style="margin:8px 0 0">${b('measure')}${b('prep')}${b('install')}</div>
        <button class="btn ghost" style="margin-top:8px" onclick="cancelComplaint()">Cancel</button></div>`;
    }
    return `<button class="btn ghost cbtn" onclick="event.stopPropagation();askComplaint('${p.id}')">⚠ Log complaint → send back</button>`;}
  return '';}
function statusBadges(p){
  const w=p.work||{}, c=w.complaint||null;
  const measured=!!p.selection;
  const prepDone=!!p.selection&&(p.selection.category_id==='wallpaper'||w.ready);
  const installed=w.status==='installed'&&!c;
  const bad=(s)=>c&&c.stage===s;
  const b=(s,on,txt)=>`<span class="badge ${bad(s)?'bad':on?'ok':''}">${bad(s)?'complaint':txt}</span>`;
  return b('measure',measured,measured?'measured':'measure')+b('prep',prepDone,prepDone?'prepped':'prep')+b('install',installed,installed?'installed':'install');
}

/* ---- worker: my tasks across all projects ---- */
async function loadAllProjects(){
  const list=(await api("/api/projects")).projects;
  const out=[];
  for(const it of list){const d=await api("/api/projects/"+it.id);out.push({id:d.id,name:d.name,data:d.data||{}});}
  return out;
}
function myTasks(projects){
  const stage=me.role==='measurer'?'measure':me.role==='tailor'?'prep':'install';
  const tasks=[];
  projects.forEach(pr=>{(pr.data.rooms||[]).forEach(rm=>{(rm.placements||[]).forEach(p=>{
    const a=p.assign||{}, w=p.work||{}, c=w.complaint||null;
    const push=(label)=>tasks.push({projectId:pr.id,projectName:pr.name,roomId:rm.id,placeId:p.id,room:rm.name,place:p.label,product:p.selection?p.selection.category_id:null,label});
    if(c){ // item sent back for correction: ONLY the targeted, assigned worker acts
      if(c.stage===stage && a[stage]===me.id) push('⚠ Fix complaint');
      return;
    }
    if(a[stage]!==me.id) return;
    let pending=false,label='';
    if(stage==='measure'){pending=!p.selection;label='Measure';}
    else if(stage==='prep'){pending=!!p.selection&&p.selection.category_id!=='wallpaper'&&!w.ready;label='Prepare';}
    else{const ready=w.ready||(p.selection&&p.selection.category_id==='wallpaper');pending=!!p.selection&&ready&&w.status!=='installed';label='Install';}
    if(pending) push(label);
  })})});
  return tasks;
}
async function renderWorker(){
  const app=document.getElementById("app");
  app.innerHTML=`<div class="top"><h1>${roleIcon()} ${esc(me.name)}</h1><span class="save">${esc(roleLabel())}</span></div><div class="wrap"><div class="empty">Loading your tasks…</div></div>`;
  const tasks=myTasks(await loadAllProjects());
  app.innerHTML=`<div class="top"><h1>${roleIcon()} ${esc(me.name)}</h1>${langSelectHTML()}<span onclick="logout()" style="cursor:pointer;font-size:13px;color:var(--muted);margin-left:6px">⎋</span></div>
    <div class="wrap"><h2>My tasks (${tasks.length})</h2>
    ${tasks.length?tasks.map(t=>`<div class="place" onclick="openTask('${t.projectId}','${t.roomId}','${t.placeId}')">
        <span class="pi">${t.product?'🪟':'📐'}</span>
        <div class="pt"><b>${esc(t.place)}${t.product?' · '+esc(catName(t.product)):''}</b><small>${esc(t.projectName)} · ${esc(t.room)} — ${esc(t.label)}</small></div>
        <span class="chev">›</span></div>`).join(""):'<div class="empty">No tasks for you right now ✓<br><span style="font-size:13px">Tasks appear when the supervisor assigns them.</span></div>'}
    <button class="btn ghost" style="margin-top:14px" onclick="renderWorker()">↻ Refresh</button></div>`;
}
async function openTask(projectId,roomId,placeId){
  const d=await api("/api/projects/"+projectId);
  project={id:d.id,name:d.name,rooms:(d.data&&(d.data.rooms||d.data.areas))||[],lang:(d.data&&d.data.lang)||'en',stage:(d.data&&d.data.stage)||'measurement',locked:!!(d.data&&d.data.locked)};
  active={roomId,placeId};
  if(me.role==='measurer'){ workerItem=false; openConfig(roomId,placeId); }
  else { workerItem=true; renderTaskItem(); }
}
function backToWorker(){workerItem=false;active=null;view="home";renderWorker();}
function renderTaskItem(){
  const app=document.getElementById("app");
  const p=place(), r=room();
  if(!p){backToWorker();return;}
  const cardHTML = me.role==='tailor' ? prepCard(r,p) : installCard(r,p);
  app.innerHTML=`<div class="top"><h1 onclick="backToWorker()" style="cursor:pointer">‹ ${esc(p.label)}</h1><span onclick="logout()" style="cursor:pointer;font-size:13px;color:var(--muted);margin-left:8px">⎋</span></div>
    <div class="wrap">${cardHTML}
      <button class="btn ghost" style="margin-top:10px" onclick="backToWorker()">‹ Back to my tasks</button></div>`;
}

/* ---- supervisor: manage workers ---- */
async function renderWorkers(){
  USERS=(await api("/api/users")).users;
  const app=document.getElementById("app");
  app.innerHTML=`<div class="top"><h1 onclick="render()" style="cursor:pointer">‹ Workers</h1></div>
    <div class="wrap">
    ${USERS.map(u=>`<div class="place"><div class="pt"><b>${esc(u.name)}</b><small>${esc(u.role)}</small></div>${u.role==='supervisor'?'':`<button class="x" onclick="delWorker('${u.id}')">×</button>`}</div>`).join("")}
    <div class="card" style="margin-top:14px"><h2>Add worker</h2>
      <label class="flbl">Name</label><input id="nwName" class="name">
      <label class="flbl">Role</label><select id="nwRole" class="name"><option value="measurer">Measurer</option><option value="tailor">Tailor</option><option value="installer">Installer</option></select>
      <label class="flbl">4-digit PIN</label><input id="nwPin" class="name" maxlength="4" inputmode="numeric" placeholder="0000">
      <button class="btn" style="margin-top:12px" onclick="addWorker()">Add worker</button>
    </div></div>`;
}
async function addWorker(){
  const name=document.getElementById("nwName").value.trim();
  const role=document.getElementById("nwRole").value;
  const pin=document.getElementById("nwPin").value.trim()||"0000";
  if(!name)return;
  await api("/api/users",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,role,pin})});
  renderWorkers();
}
async function delWorker(id){if(!confirm("Remove this worker?"))return;await api("/api/users/"+id,{method:"DELETE"});renderWorkers();}

boot();
</script>
